# More option see https://github.com/DreamMaoMao/mango/wiki/

# exec
exec-once=bash /home/ricardo/dotfiles/config/mango/autostart.sh
exec-once=swayidle -w timeout 300 'mmsg -g -m | grep -q "fullscreen 1" || swaylock -f -c 000000' timeout 1200 'mmsg -g -m | grep -q "fullscreen 1" || wayland-msg "output * dpms off"' resume 'wayland-msg "output * dpms on"' before-sleep 'swaylock -f -c 000000'
exec-once=wl-paste --type text --watch cliphist store 
exec-once=wl-paste --type image --watch cliphist store

# Window effect
blur=0
blur_layer=0

shadows = 0
layer_shadows = 0
shadow_only_floating = 1

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
#inhibit_regardless_of_visibility=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=45
repeat_delay=350
numlockon=0
xkb_rules_layout=us
xkb_rules_variant=intl

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=CTRL+ALT,R,spawn_shell,bash -c 'mmsg -s -d reload_config && notify-send "MangoWC" "Reloading config"'

# screenshot
bind=SUPER,Print,spawn_shell,flameshot gui

# speech-to-text (handy)
bindp=SUPER,t,spawn_shell,bash -c 'handy --toggle-transcription; notify-send "Handy" "ON"'
bindr=SUPER,t,spawn_shell,bash -c 'handy --toggle-transcription; notify-send "Handy" "OFF"'

# menu and terminal
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,r,spawn,rofi -show drun
bind=SUPER,e,spawn,rofi -show emoji
bind=SUPER,v,spawn_shell,cliphist list | rofi -dmenu -p "🗒 Clipboard" | cliphist decode | wl-copy
# bind=SUPER,d,spawn,wmenu-run -l 10
bind=SUPER,Return,spawn,ghostty
bind=SUPER+SHIFT,s,spawn_shell,flameshot gui

# lock keybinding
bind=SUPER,l,spawn,swaylock -c 000000

# session menu (lock, suspend, reboot, shutdown, log off)
bind=SUPER+SHIFT,e,spawn_shell,~/.config/mango/session

# exit
bind=SUPER,m,quit
# bind=SUPER,q,killclient,
bind=ALT+SHIFT,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

bind=ALT,h,focusdir,left
bind=ALT,l,focusdir,right
bind=ALT,k,focusdir,up
bind=ALT,j,focusdir,down



# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
bind=ALT+SHIFT,Left,focusmon,left
bind=ALT+SHIFT,Right,focusmon,right
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Multimedia Keys
bind=NONE,XF86AudioRaiseVolume,spawn_shell,pactl set-sink-volume @DEFAULT_SINK@ +5% && notify-send -t 1500 "Volume" "$(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\d+(?=%)' | head -1)%"
bind=NONE,XF86AudioLowerVolume,spawn_shell,pactl set-sink-volume @DEFAULT_SINK@ -5% && notify-send -t 1500 "Volume" "$(pactl get-sink-volume @DEFAULT_SINK@ | grep -oP '\d+(?=%)' | head -1)%"
bind=NONE,XF86AudioMute,spawn_shell,pactl set-sink-mute @DEFAULT_SINK@ toggle && notify-send -t 1500 "Volume" "$(pactl get-sink-mute @DEFAULT_SINK@ | grep -q yes && echo Muted || echo Unmuted)"
bind=NONE,XF86AudioMicMute,spawn_shell,pactl set-source-mute @DEFAULT_SOURCE@ toggle && notify-send -t 1500 "Mic" "$(pactl get-source-mute @DEFAULT_SOURCE@ | grep -q yes && echo Muted || echo Unmuted)"
bind=NONE,XF86MonBrightnessUp,spawn_shell,brightnessctl set +10% && notify-send -t 1500 "Brightness" "$(( $(brightnessctl get) * 100 / $(brightnessctl max) ))%"
bind=NONE,XF86MonBrightnessDown,spawn_shell,brightnessctl set 10%- && notify-send -t 1500 "Brightness" "$(( $(brightnessctl get) * 100 / $(brightnessctl max) ))%"
bind=NONE,XF86AudioPlay,spawn_shell,playerctl play-pause && notify-send -t 1500 "Media" "$(playerctl status): $(playerctl metadata title)"
bind=NONE,XF86AudioPause,spawn_shell,playerctl pause && notify-send -t 1500 "Media" "Paused: $(playerctl metadata title)"
bind=NONE,XF86AudioNext,spawn_shell,playerctl next && notify-send -t 1500 "Media" "Next: $(playerctl metadata title)"
bind=NONE,XF86AudioPrev,spawn_shell,playerctl previous && notify-send -t 1500 "Media" "Previous: $(playerctl metadata title)"

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
# mousebind=NONE,btn_left,toggleoverview,1
# mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# layer rule

windowrule=width:1000,height:900,isfloating:1,appid:blueman-manager
windowrule=width:1000,height:900,isfloating:1,appid:pulseaudio
